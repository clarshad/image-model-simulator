# Deploys N simulator pods that the orchestrator discovers via label selector.
# The orchestrator uses: --k8s-selector=foundry.workload=vllm --k8s-namespace=foundry
# It connects directly to pod IPs on port 8000 and queries /v1/models for model name.
#
# Usage:
#   kubectl apply -f simulator-deployment.yaml
#   kubectl scale deployment/image-model-simulator --replicas=5 -n foundry
#
# Each pod exposes:
#   - Port 8000: Model API (health, models, inference)
#   - Port 9000: Admin API (failure injection, metrics)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-model-simulator
  namespace: foundry
  labels:
    app: image-model-simulator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: image-model-simulator
  template:
    metadata:
      labels:
        app: image-model-simulator
        # This label is what the orchestrator uses for pod discovery.
        foundry.workload: vllm
    spec:
      # No node affinity or tolerations needed — simulators run on any node.
      containers:
        - name: simulator
          image: image-model-simulator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: admin
              containerPort: 9000
              protocol: TCP
          env:
            - name: MODEL_NAME
              value: "Qwen-Image-Edit-2511-Multiple-Images"
            - name: PORT
              value: "8000"
            - name: ADMIN_PORT
              value: "9000"
            - name: MIN_LATENCY_MS
              value: "4000"
            - name: MAX_LATENCY_MS
              value: "8000"
            - name: LOG_LEVEL
              value: "info"
            # Simulate 30s model loading on startup.
            - name: STARTUP_DELAY_S
              value: "30"
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

---
# Service to access the admin API (for failure injection from outside the cluster).
# The model API is NOT exposed via service — orchestrator connects directly to pod IPs.
apiVersion: v1
kind: Service
metadata:
  name: image-model-simulator-admin
  namespace: foundry
  labels:
    app: image-model-simulator
spec:
  type: ClusterIP
  selector:
    app: image-model-simulator
  ports:
    - name: admin
      port: 9000
      targetPort: 9000
      protocol: TCP
