# Deploy simulators for multiple different model names.
# This lets you test the orchestrator's per-model routing, queuing, and circuit breaker.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sim-qwen-image-edit
  namespace: foundry
  labels:
    app: sim-qwen-image-edit
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sim-qwen-image-edit
  template:
    metadata:
      labels:
        app: sim-qwen-image-edit
        foundry.workload: vllm
    spec:
      containers:
        - name: simulator
          image: image-model-simulator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
            - name: admin
              containerPort: 9000
          env:
            - name: MODEL_NAME
              value: "Qwen-Image-Edit-2511-Multiple-Images"
            - name: MIN_LATENCY_MS
              value: "4000"
            - name: MAX_LATENCY_MS
              value: "8000"
            - name: STARTUP_DELAY_S
              value: "10"
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

